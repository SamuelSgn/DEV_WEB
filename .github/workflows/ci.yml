name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  backend-test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Use Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: task-manager/package-lock.json
    - name: Install dependencies
      working-directory: ./task-manager
      run: npm install
    - name: Generate Prisma Client
      working-directory: ./task-manager
      run: npx prisma generate
    - name: Run tests
      working-directory: ./task-manager
      run: npm test

  frontend-test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Use Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: my_todo_app/package-lock.json
    - name: Install dependencies
      working-directory: ./my_todo_app
      run: npm install
    - name: Run build
      working-directory: ./my_todo_app
      run: npm run build

  docker-build:
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-test]
    steps:
    - uses: actions/checkout@v4
    - name: Set up Docker Buildx
      uses: actions/setup-buildx-action@v3
    - name: Build Backend Image
      uses: docker/build-push-action@v5
      with:
        context: ./task-manager
        push: false
        tags: task-manager-backend:latest
    - name: Build Frontend Image
      uses: docker/build-push-action@v5
      with:
        context: ./my_todo_app
        push: false
        tags: task-manager-frontend:latest
