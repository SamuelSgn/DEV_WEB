services:
  db:
    image: postgres:16-alpine
    container_name: task-manager-db
    environment:
      POSTGRES_USER: task_manager
      POSTGRES_PASSWORD: task_manager
      POSTGRES_DB: task_manager
    ports:
      - "5433:5432"
    volumes:
      - task_manager_db_data:/var/lib/postgresql/data

  backend:
    build:
      context: ./task-manager
      dockerfile: Dockerfile
    container_name: task-manager-api
    ports:
      - "3001:3001"
    environment:
      DATABASE_URL: "postgresql://task_manager:task_manager@db:5432/task_manager?schema=public"
      PORT: 3001
      JWT_SECRET: "super-secret"
    depends_on:
      - db

  frontend:
    build:
      context: ./my_todo_app
      dockerfile: Dockerfile
    container_name: todo-app-ui
    ports:
      - "5173:5173"
    environment:
      VITE_API_BASE_URL: "http://localhost:3001"
    depends_on:
      - backend

volumes:
  task_manager_db_data:

